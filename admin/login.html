<!-- admin/login.html - Admin Login -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - Linknet Fiber</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="../index.html" class="login-logo">
                    <span class="brand-text">Linknet<span class="brand-accent">Fiber</span></span>
                </a>
                <h1>Admin Portal</h1>
                <p>Secure access for authorized personnel only</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Email or Username
                    </label>
                    <input type="text" id="username" name="username" required placeholder="Enter email or username" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                
                <div id="login-message" class="form-message" aria-live="polite"></div>
            </form>
            
            <div class="login-footer">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
                <p class="demo-credentials">
                    <small>Demo: admin@linknetfiber.co.ke / Admin@123456</small>
                </p>
            </div>
        </div>
    </div>
    
    <script src="../js/darkmode.js"></script>
    <script src="../js/admin-login.js"></script>
</body>
</html>
